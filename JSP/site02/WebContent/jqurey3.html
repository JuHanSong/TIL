<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script type="text/javascript">
	$(function() {
		$('#b1').click(function() {
		cprice = parseInt($('#price').val())
		cCount = parseInt($('#count').val())
		total = cprice * cCount
		//1. 커피결제 금액 출력.
		alert(total);		
		//2. 2만원 이상이면 5천원 할인.
		if(total >= 20000){
			total = total-5000;
			alert(total);
		}else{
			alert(total)
		}
		})
	})

</script>
<title>Insert title here</title>
</head>
<body>
커피가격 : <input id = "price"><br>
커피수량 : <input id = "count"><br>
<button id ='b1'>결제금액 확인</button>
</body>
</html>
